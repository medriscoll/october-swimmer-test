type: canvas
display_name: "Ad Bids — Overview"

defaults:
  time_range: P30D
  comparison_mode: time

rows:
  - height: 80px
    items:
      - width: 12
        markdown:
          content: |
            # Ad Bids — Overview

            Key bid volume and pricing metrics across publishers and domains.

  - height: 220px
    items:
      - width: 12
        kpi_grid:
          metrics_view: working_model_metrics
          measures:
            - total_bids_measure_measure
            - average_bid_price_measure_measure
            - min_bid_price_measure_measure
            - max_bid_price_measure_measure
            - distinct_publishers_measure_measure
            - distinct_domains_measure_measure
          comparison:
            - percent_change
            - previous
          sparkline: right

  - height: 420px
    items:
      - width: 12
        line_chart:
          metrics_view: working_model_metrics
          title: "Avg Bid Price Over Time"
          color: primary
          x:
            field: timestamp
            type: temporal
            limit: 500
          y:
            field: average_bid_price_measure_measure
            type: quantitative
            zeroBasedOrigin: true

  - height: 380px
    items:
      - width: 6
        bar_chart:
          metrics_view: working_model_metrics
          title: "Top Publishers by Avg Bid Price"
          x:
            field: publisher
            type: nominal
            limit: 10
            sort: -y
            labelAngle: -30
          y:
            field: average_bid_price_measure_measure
            type: quantitative
            zeroBasedOrigin: true

      - width: 6
        bar_chart:
          metrics_view: working_model_metrics
          title: "Top Domains by Avg Bid Price"
          x:
            field: domain
            type: nominal
            limit: 10
            sort: -y
            labelAngle: -30
          y:
            field: average_bid_price_measure_measure
            type: quantitative
            zeroBasedOrigin: true

  - height: 220px
    items:
      - width: 12
        table:
          metrics_view: working_model_metrics
          title: "Bid Price Summary (Min / Avg / Max)"
          columns:
            - min_bid_price_measure_measure
            - average_bid_price_measure_measure
            - max_bid_price_measure_measure

  - height: 520px
    items:
      - width: 12
        table:
          metrics_view: working_model_metrics
          title: "Publisher × Domain Detail"
          columns:
            - publisher
            - domain
            - average_bid_price_measure_measure
            - min_bid_price_measure_measure
            - max_bid_price_measure_measure
