# Metrics view YAML
# Reference documentation: https://docs.rilldata.com/reference/project-files/metrics-views
# This file was generated using AI.

version: 1
type: metrics_view 

display_name: AdBids
connector: duckdb
model: AdBids
timeseries: timestamp

dimensions:
  - name: timestamp
    display_name: Timestamp
    column: timestamp
  - name: publisher
    display_name: Publisher
    column: publisher
  - name: domain
    display_name: Domain
    column: domain

measures:
  - name: total_bids_measure_measure
    display_name: Total Bids
    expression: COUNT(*)
    description: Total number of bid records.
    format_preset: humanize
  - name: distinct_publishers_measure_measure
    display_name: Distinct Publishers
    expression: COUNT(DISTINCT publisher)
    description: Number of unique publishers submitting bids.
    format_preset: humanize
  - name: distinct_domains_measure_measure
    display_name: Distinct Domains
    expression: COUNT(DISTINCT domain)
    description: Number of unique domains receiving bids.
    format_preset: humanize
  - name: total_bid_price_measure_measure
    display_name: Total Bid Price
    expression: SUM(bid_price)
    description: Sum of all bid prices.
    format_preset: humanize
  - name: average_bid_price_measure_measure
    display_name: Average Bid Price
    expression: AVG(bid_price)
    description: Average bid price across all bids.
    format_preset: humanize
  - name: min_bid_price_measure_measure
    display_name: Minimum Bid Price
    expression: MIN(bid_price)
    description: Lowest bid price observed.
    format_preset: humanize
  - name: max_bid_price_measure_measure
    display_name: Maximum Bid Price
    expression: MAX(bid_price)
    description: Highest bid price observed.
    format_preset: humanize
  - name: distinct_bid_ids_measure_measure
    display_name: Distinct Bid IDs
    expression: COUNT(DISTINCT id)
    description: Number of unique bid IDs.
    format_preset: humanize
